name: CI
run-name: Deploy run :#${{ github.run_number }} - commit "${{ github.event.head_commit.message }}" by ${{ github.actor }}

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "lts/*"

      - name: Install backend Dependencies
        working-directory: ./api
        run: yarn install

      - name: Install frontend Dependencies
        working-directory: ./app
        run: yarn install

      - name: Run backend lint
        working-directory: ./api
        run: yarn lint

      # - name: Run frontend lint
      #   working-directory: ./app
      #   run: yarn lint

  e2e:
    runs-on: ubuntu-latest
    needs:
      - lint
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "lts/*"

      - name: Install Postgres Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install backend Dependencies
        working-directory: ./api
        run: yarn install

      - name: Install E2E Dependencies
        working-directory: ./e2e
        run: yarn install

      - name: Install Cypress (no lockfile)
        working-directory: ./e2e
        run: npm install --no-save cypress@15.10.0

      - name: Write E2E Compose Override
        run: |
          cat > /tmp/docker-compose.e2e.override.yml <<EOF
          services:
            app:
              environment:
                POSTMARK_API_TOKEN: "${POSTMARK_API_TOKEN}"
                STRIPE_EVENT_SUBSCRIPTION_PRICE_ID: "${STRIPE_EVENT_SUBSCRIPTION_PRICE_ID}"
                STRIPE_SK: "${STRIPE_SK_E2E}"
                VITE_STRIPE_PK: "${STRIPE_PK_E2E}"
          EOF
        env:
          POSTMARK_API_TOKEN: ${{ secrets.POSTMARK_API_TOKEN }}
          STRIPE_EVENT_SUBSCRIPTION_PRICE_ID: ${{ secrets.STRIPE_EVENT_SUBSCRIPTION_PRICE_ID }}
          STRIPE_SK_E2E: ${{ secrets.STRIPE_SK_E2E }}
          STRIPE_PK_E2E: ${{ secrets.STRIPE_PK_E2E }}

      - name: Start E2E Services
        run: docker compose -f docker-compose.e2e.yml -f /tmp/docker-compose.e2e.override.yml up -d --build

      - name: Check E2E Containers
        run: docker compose -f docker-compose.e2e.yml ps

      - name: Wait for app
        run: |
          for i in {1..15}; do
            if curl -fsS http://localhost:3000/ >/dev/null; then
              echo "App is ready."
              exit 0
            fi
            sleep 5
          done
          echo "App did not become ready in time."
          exit 1

      - name: Dump E2E Logs
        if: failure()
        continue-on-error: true
        run: |
          docker compose -f docker-compose.e2e.yml ps -a
          docker compose -f docker-compose.e2e.yml logs --no-color app
          docker compose -f docker-compose.e2e.yml logs --no-color db
          docker compose -f docker-compose.e2e.yml logs --no-color minio

      - name: Run Cypress E2E
        working-directory: ./e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/eventpilot_e2e?schema=public
        run: npx cypress run

  docker:
    runs-on: ubuntu-latest
    needs:
      # - test
      - lint
    if: github.ref == 'refs/heads/main' # Ensures this job runs only on the main branch
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: jackcranee/eventpilot:0.3.1
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy to DigitalOcean
        uses: digitalocean/app_action/deploy@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}
          app_name: eventpilot
          print_build_logs: true
          print_deploy_logs: true
